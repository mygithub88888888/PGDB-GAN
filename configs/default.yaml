# PGDB-GAN Configuration Template
# Stage 1: Base Model Training
stage1:
  batch_size: 1
  epochs: 2001
  lr: 0.0003
  seed: 2
  gradient_clip: 5.0

# Stage 2: Knowledge Distillation
stage2:
  epochs: 10
  lr: 0.0001
  lambda_distill: 0.7
  lambda_gan: 0.1
  lambda_gabor: 0.5
  temperature: 1.0
  gabor_orientations: 6
  gabor_freq_bands: 2

# Stage 3: Structured Pruning
stage3:
  prune_amount: 0.3
  gabor_kernel_size: 3

# Physical Priors
physical:
  alpha: 0.5
  beta: 0.7
  epsilon: 1.0e-9

# Hardware
hardware:
  gpu: 0
  mixed_precision: true
